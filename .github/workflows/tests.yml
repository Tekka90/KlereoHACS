name: Unit Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: bash setup_test_env.sh
      - name: Run unit tests
        run: .venv/bin/pytest tests/unit/ -v --tb=short
